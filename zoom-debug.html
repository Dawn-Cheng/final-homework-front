<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>缩放调试</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #1a1a2e;
    font-family: monospace;
    color: #fff;
  }
  .wrapper {
    position: absolute;
    top: 0; left: 0; right: 0;
    min-height: 100vh;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
    padding: 20px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }
  .phone {
    width: 390px;
    height: 844px;
    background: #000;
    border-radius: 44px;
    padding: 12px;
    flex-shrink: 0;
    transition: transform 0.15s ease;
    transform-origin: top center;
    position: relative;
  }
  .phone-screen {
    width: 100%;
    height: 100%;
    background: #f5f5f5;
    border-radius: 32px;
    overflow-y: auto;
    padding: 20px;
  }
  .info {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.8);
    padding: 10px;
    border-radius: 8px;
    font-size: 12px;
    z-index: 9999;
    line-height: 1.6;
  }
  .info span { color: #4fc3f7; }
</style>
</head>
<body>
<div class="info">
  innerHeight: <span id="ih">-</span><br>
  visualViewport.height: <span id="vh">-</span><br>
  visualViewport.scale: <span id="vs">-</span><br>
  devicePixelRatio: <span id="dpr">-</span><br>
  phone scale: <span id="ps">1</span><br>
  <small>尝试 Ctrl+加/减 缩放</small>
</div>

<div class="wrapper" id="wrapper">
  <div class="phone" id="phone">
    <div class="phone-screen" id="screen">
      <h3>缩放调试页面</h3>
      <p>用 Ctrl + + / - 缩放浏览器，观察左上角数据。</p>
      <p>手机框应随缩放自动缩小，始终完整显示在视口内。</p>
      <div style="height: 1200px; margin-top: 40px; padding: 20px; background: #e0e0e0; border-radius: 12px;">
        <h4>长内容区域</h4>
        <p>向下滚动我，测试手机屏幕内滚动是否正常。</p>
        <p style="margin-top: 200px;">快到底了...</p>
        <p style="margin-top: 200px;">到底了 🎉</p>
      </div>
    </div>
  </div>
</div>

<script>
const phone = document.getElementById('phone')
const info = {
  ih: document.getElementById('ih'),
  vh: document.getElementById('vh'),
  vs: document.getElementById('vs'),
  dpr: document.getElementById('dpr'),
  ps: document.getElementById('ps'),
}

function updateInfo() {
  info.ih.textContent = window.innerHeight
  info.vh.textContent = window.visualViewport?.height ?? '-'
  info.vs.textContent = window.visualViewport?.scale ?? '-'
  info.dpr.textContent = window.devicePixelRatio
}

function updateScale() {
  const vh = window.visualViewport?.height ?? window.innerHeight
  const phoneH = 844 + 40
  const needScale = Math.min(1, (vh - 40) / phoneH)
  phone.style.transform = needScale < 1 ? `scale(${needScale})` : ''
  info.ps.textContent = needScale.toFixed(3)
  updateInfo()
}

updateScale()
updateInfo()

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', updateScale)
  window.visualViewport.addEventListener('scalechange', updateScale)
}
window.addEventListener('resize', updateScale)
// 额外监听 wheel 事件（Ctrl+滚轮缩放）
window.addEventListener('wheel', (e) => {
  if (e.ctrlKey) {
    // Ctrl+滚轮会触发缩放，visualViewport 事件可能延迟，这里强制更新
    requestAnimationFrame(updateScale)
  }
}, { passive: true })
</script>
</body>
</html>
